services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: absensi-sekolah-qr-code
    container_name: absensi-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    env_file:
      - .env.docker
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - app-network
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: absensi-db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      SERVICE_NAME: db
      SERVICE_TAGS: dev
    env_file:
      - .env.docker
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "mysql -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --ssl-mode=DISABLED -e 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: absensi-pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
